<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <!-- Import the font from Google Fonts -->
<link href='https://fonts.googleapis.com' rel='stylesheet'>
    
<style>
    .doodle-text {
        font-family: 'Rubik Doodle Shadow', cursive;
        font-size: 24px; /* Optional: Makes the doodles larger */
        }
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #ffeef2;
  background-image: 
    linear-gradient(#ffd6e0 1px, transparent 1px),
    linear-gradient(90deg, #ffd6e0 1px, transparent 1px);
  background-size: 50px 50px;
}

.page { display: none; text-align: center; }
.active { display: block; animation: fadeIn 0.8s ease; }


h1, h2 {
  font-family: 'Patrick Hand', cursive;
  color: #ff4d6d;
  font-size: 32px;
}

p { font-size: 18px; }

button {
  padding: 12px 30px;
  border: none;
  border-radius: 25px;
  background: #ff6b81;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-top: 20px;
}

.kitten {
  width: 360px;
  margin: 40px 0;
}

/* CAT WRAPPER */
.cat-wrapper {
  position: relative;
  width: 1000px;
  margin: auto;
}

.cat-img {
  width: 100%;
  display: block;
}

/* ENVELOPE positioned over cat card */
.envelope {
  position: absolute;
  bottom: 85px;   
  left: 50%;
  transform: translateX(-50%);
  width: 520px;
  height: 320px;
  background: #ffc2d1;
  border-radius: 40px;
  cursor: pointer;
  z-index: 2;
  overflow: hidden;
}

/* FLAP */
.flap {
  position: absolute;
  top: 0;
  width: 100%;
  height: 150px;
  background: #ff8fab;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transition: 0.6s;
  z-index: 3;
  transform-origin: top;
}

/* LETTER */
.letter {
  position: absolute;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center; 
  width: 90%;
  height: 320px;
  background: white;
  top: 20px;
  left: 5%;
  text-align: center;
  padding: 25px;
  border-radius: 20px;
  transform:  translateY(200%);
  box-sizing: border-box;
  text-align: center;
  transition: 0.6s;
}

/* OPEN ANIMATION */
.envelope.open .flap {
  transform: rotateX(180deg);
}

.envelope.open .letter {
  transform: translateY(-40px);
}
.heart {
  position: absolute;
  color: #ff4d6d;
  font-size: 20px;
  animation: floatUp 3s linear forwards;
  z-index: 5;
  pointer-events: none;
}
@keyframes floatUp {
  0% {
    transform: translateY(0) scale(0.8);
    opacity: 1;
  }
  50% {
    transform: translateY(-100px) scale(1.4); /* was -200px */
    opacity: 0.7;
  }
  100% {
    transform: translateY(-200px) scale(1.8); /* was -200px */
    opacity: 0;
  }
}
.photos img {
  width: 360px;
  height: 420px;
  object-fit: cover;
  background: white;
  padding: 10px 10px 30px 10px; /* bottom space like polaroid */
  border-radius: 8px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  transform: rotate(-3deg);
  transition: 0.3s;
}
.photos img:nth-child(2) {
  transform: rotate(4deg);
}

.photos img:nth-child(3) {
  transform: rotate(-6deg);
}
</style>
</head>
<body>
    <audio autoplay >
        <source src="Audio/happy_birthday.mp3">
    </audio>
<!-- PAGE 1 (MATCHED STYLE) -->
<div class="page active" id="page1">

    <h1>HEY!!</h1>
    <img class="kitten" src="images/kitten_1-removebg-preview.png">
    <p style="font-family: 'Brush Script MT', cursive; font-size:xx-large;">I made something for you<br>Do you want to see?</p>
    <button onclick="nextPage(2)">Click Me</button>

</div>

<!-- PAGE 2 -->
<div class="page" id="page2">
  
    <img class="kitten" src="images/cake-removebg-preview.png" >
    <h2>Happy Birthday BBG ❤️</h2>
    <p style="font-family: 'Brush Script MT', cursive; font-size:xx-large;">You are my annoying blood 💌</p>
    <button onclick="nextPage(3)">Next</button>
 
</div>

<!-- PAGE 3 (FIXED ENVELOPE) -->
<!-- PAGE 3 -->
<div class="page" id="page3">

  <div class="cat-wrapper">
    <img src="images/holding cat.png" class="cat-img">
    
    <div class="envelope" onclick="openEnvelope(this)">
        <div class="flap"></div>
        <div class="letter" onclick="nextPage(4)">
            You are loved more than you know 💌
            <br><small>(Tap to continue)</small>
        </div>
    </div>

  </div>

</div>

<!-- PAGE 4 -->
<div class="page" id="page4">
 
    <img class="kitten" src="https://media.giphy.com/media/ICOgUNjpvO0PC/giphy.gif">
    <p class="doodle-text">You are seen, heard and loved ❤️</p>
    <button onclick="nextPage(5)">📷 Click Here</button>
 
</div>

<!-- PAGE 5 -->
<div class="page" id="page5">
  
    <h2>I Love You 💞</h2>
    <div class="photos">
      <img src="images/ammu 1.jpeg">
      <img src="images/Ammu 2.jpeg">
      <img src="images/ammu 3.jpeg">
    </div>
    <button onclick="nextPage(6)">🎁 Click Here</button>
  
</div>

<!-- PAGE 6 -->
<div class="page" id="page6">
 
    <img class="kitten" src="images/output-onlinegiftools.gif">
    <h2>ThankU for being born 💖</h2>
 
</div>

<script>
let heartInterval;

function startHearts() {
  const activePage = document.querySelector(".page.active");

  heartInterval = setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤";

    heart.style.left = Math.random() * 100 + "%";
    heart.style.bottom = "0px";

    activePage.appendChild(heart);

    setTimeout(() => heart.remove(), 3000);
  }, 300);
}

function stopHearts() {
  clearInterval(heartInterval);
}
function nextPage(num){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page'+num).classList.add('active');

  if(num !==1){
    startHearts();   // ONLY page 2
  } else {
    stopHearts();
  }
}


function openEnvelope(el){
  el.classList.add('open');

}

</script>

</body>
</html>
